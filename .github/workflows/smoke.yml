name: smoke

on:
  push:
  pull_request:

jobs:
  cpu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install smoke/test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run CPU smoke examples
        run: |
          python examples/minimal_selected_normalizer_smoke.py --device cpu --N 8 --H 16 --C 64 --tile-c 16
          python examples/multiselected_parity_smoke.py --device cpu --N 8 --H 16 --C 64 --tile-c 16
      - name: Run unit tests
        run: python -m pytest tests -q
